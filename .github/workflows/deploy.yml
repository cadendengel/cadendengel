name: Deploy Vite site to S3

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::271995868497:role/TrustPolicy_cadendengel
          aws-region: us-east-2

      - name: Deploy static assets to S3
        run: aws s3 sync dist/ s3://cadendengel/ --exclude "index.html" --cache-control "public,max-age=31536000,immutable"

      - name: Deploy index.html with no-cache headers
        run: aws s3 cp dist/index.html s3://cadendengel/index.html --cache-control "no-cache,no-store,must-revalidate" --content-type "text/html; charset=utf-8"

  deploy-counter-proxy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::271995868497:role/TrustPolicy_cadendengel
          aws-region: us-east-2

      - name: Build counter proxy
        run: sam build -t infrastructure/counter-proxy/template.yaml

      - name: Deploy counter proxy stack
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name cadendengel-counter-proxy \
            --s3-bucket cadendengel \
            --s3-prefix sam-artifacts/counter-proxy \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides AllowedOrigin=https://cadendengel.com \
            --region us-east-2 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset