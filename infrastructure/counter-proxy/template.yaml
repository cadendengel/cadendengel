AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Counter API proxy for cadendengel.com

Parameters:
  AllowedOrigin:
    Type: String
    Default: https://cadendengel.com
    Description: Allowed browser origin for CORS responses.

Resources:
  CounterTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cadendengel-portfolio-counters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: counterId
          AttributeType: S
      KeySchema:
        - AttributeName: counterId
          KeyType: HASH

  CounterProxyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Accept

  CounterProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cadendengel-counter-proxy
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: ./
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          COUNTER_TABLE_NAME: !Ref CounterTable
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref CounterTable
      Events:
        CounterRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref CounterProxyApi
            Path: /api/counter
            Method: GET
        CounterProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref CounterProxyApi
            Path: /api/counter/{proxy+}
            Method: GET
        CounterProxyOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref CounterProxyApi
            Path: /api/counter/{proxy+}
            Method: OPTIONS

  CounterProxyInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CounterProxyFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CounterProxyApi}/*/*

Outputs:
  CounterProxyApiUrl:
    Description: Invoke URL for the counter proxy HTTP API.
    Value: !Sub https://${CounterProxyApi}.execute-api.${AWS::Region}.amazonaws.com

  CounterTableName:
    Description: DynamoDB table used for portfolio counters.
    Value: !Ref CounterTable